<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faiz Fanan | Under Development</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #06142b, #0b1f45, #102a5c);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      padding: 50px 30px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    p {
      font-size: 1.1rem;
      color: #c7d3e6;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .tag {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: #dbe7ff;
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 12px;
      background: white;
      color: #0b1f45;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 25px;
      font-size: 0.9rem;
      color: #9fb1cf;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tag">Portfolio Website</div>
    <h1>Under Development</h1>
    <p>
      Hi, I'm Faiz Fanan. My portfolio website is currently being designed and upgraded.
      A better experience with projects, skills, and creative work will be live soon.
    </p>
    <a href="https://github.com/Faizzie7" target="_blank" class="btn">Visit My GitHub</a>
    <div class="footer">faizfanan.me • Coming Soon</div>
  </div>
</body>
</html>
